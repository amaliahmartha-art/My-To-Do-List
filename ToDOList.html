<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="ToDOList.css">
</head>
<body>

    <header>
        <div class="header-content">
            <span class="header-logo">Amaliahs Task Manager</span>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            
            <h1>My To-Do List</h1>
            
            <div class="input-section">
                <input type="text" id="taskInput" placeholder="Add your tasks here..." />
                <button id="addBtn">Add Task</button>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="activeTasks">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completedTasks">0</div>
                    <div class="stat-label">Completed Tasks</div>
                </div>
            </div>

            <ul id="todoList"></ul>
            
            <div class="empty-state" id="emptyState" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 11l3 3L22 4"></path>
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                </svg>
                <p>No added tasks yet, Add your first task above!</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Muronga Martha Amalia. All rights reserved.</p>
    </footer>

    <script>
        // Check localStorage for existing items. If empty, apply default tasks.
        let savedTasks = localStorage.getItem('amaliahTasks');
        let tasks = savedTasks ? JSON.parse(savedTasks) : [
            { id: 1, text: 'Welcome to Amaliahs Task Manager!', completed: false, createdAt: Date.now() },
            { id: 2, text: 'Add tasks using the input above', completed: false, createdAt: Date.now() },
            { id: 3, text: 'Click checkbox to mark tasks completed', completed: false, createdAt: Date.now() },
            { id: 4, text: 'Click delete to remove tasks', completed: false, createdAt: Date.now() }
        ];

        // Ensure new IDs don't conflict with existing items
        let taskIdCounter = tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) + 1 : 1;

        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');
        const emptyState = document.getElementById('emptyState');
        const totalTasksEl = document.getElementById('totalTasks');
        const activeTasksEl = document.getElementById('activeTasks');
        const completedTasksEl = document.getElementById('completedTasks');

        // Persistent storage engine
        function saveToLocalStorage() {
            localStorage.setItem('amaliahTasks', JSON.stringify(tasks));
        }

        // Create/Add Tasks
        function addTask() {
            const taskText = taskInput.value.trim();
            
            if (taskText === '') {
                alert('Please enter a task!');
                return;
            }

            const task = {
                id: taskIdCounter++,
                text: taskText,
                completed: false,
                createdAt: Date.now()
            };

            tasks.push(task);
            taskInput.value = '';
            
            saveToLocalStorage();
            renderTasks();
            updateStats();
        }

        // Delete Tasks
        function deleteTask(id) {
            tasks = tasks.filter(task => task.id !== id);
            
            saveToLocalStorage();
            renderTasks();
            updateStats();
        }

        // Update/Toggle Completion Status
        function toggleTask(id) {
            const task = tasks.find(task => task.id === id);
            if (task) {
                task.completed = !task.completed;
                
                saveToLocalStorage();
                renderTasks();
                updateStats();
            }
        }

        function renderTasks() {
            todoList.innerHTML = '';
            
            if (tasks.length === 0) {
                emptyState.style.display = 'block';
                return;
            } else {
                emptyState.style.display = 'none';
            }

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `todo-item ${task.completed ? 'completed' : ''}`;
                
                li.innerHTML = `
                    <div class="checkbox ${task.completed ? 'checked' : ''}" 
                         onclick="toggleTask(${task.id})"></div>
                    <span class="todo-text">${escapeHtml(task.text)}</span>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
                `;
                
                todoList.appendChild(li);
            });
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(task => task.completed).length;
            const active = total - completed;
            
            totalTasksEl.textContent = total;
            activeTasksEl.textContent = active;
            completedTasksEl.textContent = completed;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        addBtn.addEventListener('click', addTask);
        
        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // Initialize display from localStorage data source on load
        renderTasks();
        updateStats();
    </script>
</body>
</html>
