<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="ToDOList.css">
</head>
<body>

    <header>
        <div class="header-content">
            <span class="header-logo">Amaliahs Task Manager</span>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            
            <h1>My To-Do List</h1>
            
            <div class="input-section">
                <input type="text" id="taskInput" placeholder="Add your tasks here..." />
                <button id="addBtn">Add Task</button>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="activeTasks">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completedTasks">0</div>
                    <div class="stat-label">Completed Tasks</div>
                </div>
            </div>

            <ul id="todoList"></ul>
            
            <div class="empty-state" id="emptyState" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 11l3 3L22 4"></path>
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                </svg>
                <p>No added tasks yet, Add your first task above!</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Muronga Martha Amalia. All rights reserved.</p>
    </footer>

    <script src="todo.js"></script>
</body>
</html>
